<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GraphicsSolutionTricks - Prompt Catalog</title>
  <style>
    :root{
      --bg:#f2f4fb;
      --card:#ffffff;
      --line:#dce3ef;
      --text:#0f172a;
      --muted:#586174;
      --primary:#3b57f4;
      --primary-soft:#eef1ff;
      --ring:rgba(59,87,244,.2);
      --shadow:0 10px 30px rgba(15,23,42,.08);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(1200px 500px at 50% -150px,#dfe7ff,transparent),var(--bg);color:var(--text)}
    .wrap{max-width:1240px;margin:0 auto;padding:14px}

    .topbar{
      position:sticky;top:10px;z-index:50;background:rgba(255,255,255,.86);
      backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:18px;padding:10px;
      display:flex;gap:8px;align-items:center;flex-wrap:wrap;box-shadow:var(--shadow)
    }

    .btn{border:1px solid #ced6e4;background:#fff;border-radius:12px;padding:8px 12px;font-size:13px;cursor:pointer;text-decoration:none;color:var(--text);display:inline-flex;align-items:center;gap:6px}
    .btn:hover{border-color:#b7c2d8}
    .btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
    .btn.ghost{background:#f8faff}

    .hero{padding:14px 4px 8px}
    .headline{font-size:30px;font-weight:800;margin:6px 0 0;letter-spacing:-.3px}
    .sub{font-size:14px;color:var(--muted);margin-top:6px}

    .controls{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;margin-top:12px}
    #search{width:100%;border:1px solid #cbd5e1;border-radius:14px;padding:12px 14px;font-size:15px;background:#fff;outline:none}
    #search:focus{border-color:var(--primary);box-shadow:0 0 0 4px var(--ring)}

    .viewToggle{display:flex;gap:6px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:4px;flex-wrap:wrap}
    .viewToggle button{border:0;background:transparent;padding:8px 10px;border-radius:9px;cursor:pointer;color:#334155;font-size:13px}
    .viewToggle button.active{background:var(--primary-soft);color:#1f3bd7;font-weight:700}

    .toolbar2{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}
    .toolbar2 .btn.active{background:var(--primary-soft);border-color:#bccbff;color:#1f3bd7;font-weight:700}
    .toolbar2 select{border:1px solid #ced6e4;background:#fff;border-radius:12px;padding:8px 10px;font-size:13px}

    #count{font-size:13px;color:var(--muted);margin:10px 2px}

    .summary{display:flex;gap:8px;overflow:auto;padding-bottom:6px;margin:4px 0 10px}
    .summary::-webkit-scrollbar{height:8px}
    .summary::-webkit-scrollbar-thumb{background:#d4d9e3;border-radius:30px}
    .chip{
      display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
      border:1px solid #dbe3f0;background:#f9fbff;border-radius:999px;
      padding:7px 11px;font-size:12px;color:#334155
    }
    .chip button{all:unset;cursor:pointer}
    .chip.active{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:700}
    .chip.active b{color:#fff}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

    .detailOverlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:14px;z-index:10020}
    .detailOverlay.open{display:flex}
    .detailContent{width:min(980px,96vw);max-height:90vh;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:var(--shadow)}
    .detailTop{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}
    .detailClose{border:1px solid #d1d5db;background:#fff;border-radius:10px;padding:6px 10px;cursor:pointer}
    .detailGrid{display:grid;grid-template-columns:320px 1fr;gap:12px}
    .detailGrid img{width:100%;border-radius:12px;object-fit:cover;max-height:70vh}
    @media (max-width:860px){.detailGrid{grid-template-columns:1fr}.detailGrid img{max-height:40vh}}

    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 2px 5px rgba(15,23,42,.04);display:flex;flex-direction:column}
    .visual{position:relative}
    .thumb{width:100%;aspect-ratio:4/3;object-fit:cover;background:#e8edf6;cursor:zoom-in;display:block}
    .badgeRow{position:absolute;top:10px;right:10px;display:flex;gap:6px;flex-wrap:wrap;max-width:88%}
    .badge{font-size:11px;padding:4px 7px;border-radius:999px;background:rgba(15,23,42,.74);color:#fff}
    .starBtn{position:absolute;top:10px;left:10px;border:1px solid rgba(255,255,255,.8);background:rgba(255,255,255,.9);border-radius:999px;padding:4px 8px;cursor:pointer;font-size:16px;line-height:1}
    .starBtn.active{background:#fff5c2;border-color:#ffdb6e}
    .selectPick{position:absolute;top:46px;left:10px;background:rgba(255,255,255,.95);border:1px solid #d1d5db;border-radius:10px;padding:4px 8px;font-size:12px;display:flex;align-items:center;gap:6px}

    .body{padding:12px}
    .metaLinks{display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:13px}
    .metaLinks a{color:#1e40af;text-decoration:none}

    .promptWrap{margin-top:10px;border:1px solid #e3e8f2;background:#fbfcff;border-radius:12px;padding:10px}
    .promptTop{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .promptTitle{font-size:12px;color:#64748b;font-weight:700}
    .showPrompt{border:0;background:transparent;color:#1d4ed8;cursor:pointer;font-size:12px;padding:0}
    .prompt{margin-top:8px;line-height:1.5;font-size:14px;white-space:pre-wrap;display:none}
    .prompt.open{display:block}

    .desc{margin-top:9px;font-size:13px;color:#334155;background:#f8fafc;border:1px solid #e7ebf3;border-radius:11px;padding:8px}

    .actions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:12px}
    .actions .btn{justify-content:center;padding:9px 8px}
    .btn.danger{background:#fff5f5;border-color:#fecaca;color:#b91c1c}

    .toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:9px 13px;border-radius:9px;font-size:13px;opacity:0;transition:.2s;z-index:10001}
    .toast.show{opacity:1}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;padding:16px;z-index:10000}
    .modal.open{display:flex}
    .modal img{width:auto;height:auto;max-width:95vw;max-height:90vh;object-fit:contain;cursor:zoom-out}
    .modal .close{position:absolute;top:12px;left:12px;background:#fff;border:0;border-radius:999px;padding:8px 11px;cursor:pointer;font-weight:bold}

    body.compact-view .grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
    body.compact-view .thumb{aspect-ratio:1/1}
    body.compact-view .body{padding:10px}
    body.compact-view .desc{display:none}
    body.compact-view .actions{grid-template-columns:1fr;gap:6px}
    body.compact-view .metaLinks{font-size:12px}

    body.gallery-view .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
    body.gallery-view .card{padding:0;border-radius:12px;overflow:hidden}
    body.gallery-view .body{display:none}
    body.gallery-view .thumb{aspect-ratio:1/1}

    @media (max-width:860px){
      .controls{grid-template-columns:1fr}
      .viewToggle{justify-self:start}
      .headline{font-size:26px}
      .actions{grid-template-columns:1fr}
      .thumb{aspect-ratio:16/11}
      body.compact-view .thumb{aspect-ratio:4/3}
    }
    @media (max-width:480px){
      .wrap{padding:10px}
      .topbar{top:6px;border-radius:14px}
      .headline{font-size:24px}
      .hero{padding-top:10px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="btn" href="./index.html">← כל הפרופילים</a>
      <a class="btn" href="./panha.html">לעמוד פרופיל שני</a>
      <a class="btn" href="./graphics.csv" target="_blank">CSV מקור</a>
      <span class="chip">v4 טורבו פק</span>
      <button class="btn" id="exportHiddenBtn" type="button" style="display:none">ייצוא חסומים</button>
    </div>

    <div class="hero">
      <div class="headline">GraphicsSolutionTricks</div>
      <div class="sub">גלריית פרומפטים פרימיום — חיפוש מהיר, סינון מתקדם ותצוגה נוחה לנייד</div>

      <div class="controls">
        <input id="search" type="text" placeholder="חיפוש בפרומפט / קטגוריה / סוג / קישורים" />
        <div class="viewToggle" role="tablist" aria-label="מצב תצוגה">
          <button id="expandedBtn" class="active" type="button">תצוגה מלאה</button>
          <button id="compactBtn" type="button">תצוגה קומפקטית</button>
          <button id="galleryBtn" type="button">גלריה מהירה</button>
        </div>
      </div>

      <div class="toolbar2">
        <button class="btn" id="favOnlyBtn" type="button">⭐ מועדפים בלבד</button>
        <select id="typeFilter" aria-label="סוג">
          <option value="all">כל הסוגים</option>
          <option value="image">תמונה</option>
          <option value="video">וידאו</option>
        </select>
        <button class="btn" id="longPromptBtn" type="button">פרומפטים ארוכים (180+)</button>
        <select id="fbFilter" aria-label="קישור פייסבוק">
          <option value="all">עם/בלי פייסבוק</option>
          <option value="with">עם פייסבוק</option>
          <option value="without">בלי פייסבוק</option>
        </select>
        <select id="sortSelect" aria-label="מיון">
          <option value="newest">מיון: חדש לישן</option>
          <option value="oldest">מיון: ישן לחדש</option>
          <option value="prompt_len_desc">אורך פרומפט: ארוך לקצר</option>
          <option value="prompt_len_asc">אורך פרומפט: קצר לארוך</option>
        </select>
        <button class="btn" id="batchModeBtn" type="button">מצב בחירה</button>
        <button class="btn" id="copySelectedBtn" type="button">העתקת נבחרים</button>
        <button class="btn" id="clearSelectedBtn" type="button">ניקוי בחירה</button>
        <button class="btn" id="exportCsvBtn" type="button">ייצוא CSV מסונן</button>
      </div>

      <div id="count"></div>
      <div id="summary" class="summary"></div>
    </div>

    <div id="list" class="grid">טוען...</div>
  </div>

  <div id="detailOverlay" class="detailOverlay" aria-hidden="true">
    <div class="detailContent" id="detailContent"></div>
  </div>

  <div id="toast" class="toast">הועתק</div>
  <div id="imgModal" class="modal" aria-hidden="true">
    <button class="close" id="closeModal">✕</button>
    <img id="modalImg" src="" alt="preview" />
  </div>

  <script>
    function parseCSV(text){
      const rows=[]; let i=0, cur='', row=[], q=false;
      while(i<text.length){
        const c=text[i];
        if(c==='"'){ if(q && text[i+1]==='"'){ cur+='"'; i++; } else q=!q; }
        else if(c===',' && !q){ row.push(cur); cur=''; }
        else if((c==='\n'||c==='\r') && !q){ if(c==='\r'&&text[i+1]==='\n') i++; row.push(cur); if(row.some(x=>x!=='')) rows.push(row); row=[]; cur=''; }
        else cur+=c;
        i++;
      }
      if(cur.length||row.length){ row.push(cur); rows.push(row); }
      return rows;
    }

    const escapeHtml = (s='') => s.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
    const csvCell = (v='') => {
      const s=String(v??'');
      if(/[",\n\r]/.test(s)) return '"'+s.replaceAll('"','""')+'"';
      return s;
    };

    const isAdmin = new URLSearchParams(location.search).get('admin')==='1';
    const LOCAL_HIDDEN_KEY='prompt_catalog_hidden_ids';
    const FAVORITES_KEY='graphics_favorite_ids_v1';
    let localHiddenIds = new Set(JSON.parse(localStorage.getItem(LOCAL_HIDDEN_KEY)||'[]'));
    let favoriteIds = new Set(JSON.parse(localStorage.getItem(FAVORITES_KEY)||'[]'));
    let globalHiddenIds = new Set();

    function makeId(item){
      const base=`${item.img}|${item.prompt}|${item.fb||item.post}`;
      let h=0;
      for(let i=0;i<base.length;i++) h=((h<<5)-h)+base.charCodeAt(i), h|=0;
      return 'id_'+Math.abs(h);
    }

    function extractSortScore(x){
      const source = `${x.post||''} ${x.fb||''} ${x.img||''}`;
      const ids = [...source.matchAll(/\d{5,}/g)].map(m=>Number(m[0])).filter(n=>Number.isFinite(n));
      return ids.length ? ids[ids.length-1] : 0;
    }

    async function loadGlobalHidden(){
      try{
        const r=await fetch('./removed_ids.json',{cache:'no-store'});
        if(!r.ok) return;
        const j=await r.json();
        const ids=Array.isArray(j)?j:(j.ids||[]);
        globalHiddenIds = new Set(ids);
      }catch{}
    }

    function showToast(msg){
      const t=document.getElementById('toast');
      t.textContent=msg; t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),1200);
    }

    async function copyText(text,label){
      try{ await navigator.clipboard.writeText(text||''); }
      catch{ const ta=document.createElement('textarea'); ta.value=text||''; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); }
      showToast(`הועתק: ${label}`);
    }

    const modal=document.getElementById('imgModal');
    const modalImg=document.getElementById('modalImg');
    const closeModal=()=>{ modal.classList.remove('open'); modal.setAttribute('aria-hidden','true'); modalImg.src=''; };
    document.getElementById('closeModal').addEventListener('click', closeModal);
    modal.addEventListener('click', (e)=>{ if(e.target===modal || e.target===modalImg) closeModal(); });
    document.addEventListener('keydown', (e)=>{ if(e.key==='Escape') closeModal(); });

    fetch('./graphics.csv').then(r=>r.text()).then(t=>{
      const rows=parseCSV(t); const head=rows.shift()||[];
      const idx=Object.fromEntries(head.map((h,i)=>[(h||'').trim(),i]));

      const list=document.getElementById('list');
      const count=document.getElementById('count');
      const search=document.getElementById('search');
      const summary=document.getElementById('summary');
      const expandedBtn=document.getElementById('expandedBtn');
      const compactBtn=document.getElementById('compactBtn');
      const galleryBtn=document.getElementById('galleryBtn');
      const exportHiddenBtn=document.getElementById('exportHiddenBtn');

      const favOnlyBtn=document.getElementById('favOnlyBtn');
      const typeFilter=document.getElementById('typeFilter');
      const longPromptBtn=document.getElementById('longPromptBtn');
      const fbFilter=document.getElementById('fbFilter');
      const sortSelect=document.getElementById('sortSelect');
      const batchModeBtn=document.getElementById('batchModeBtn');
      const copySelectedBtn=document.getElementById('copySelectedBtn');
      const clearSelectedBtn=document.getElementById('clearSelectedBtn');
      const exportCsvBtn=document.getElementById('exportCsvBtn');

      if(isAdmin && exportHiddenBtn) exportHiddenBtn.style.display='inline-flex';

      let activeCategories=new Set(['הכל']);
      let viewMode='expanded';
      let selectedItem=null;
      let filteredSnapshot=[];
      let selectionMode=false;
      const selectedIds = new Set();
      const expandedPrompts=new Set();

      const filters={
        favoritesOnly:false,
        type:'all',
        longOnly:false,
        fb:'all',
        sort:'newest'
      };

      function inferOutcome(prompt, category){
        const p=(prompt||'').toLowerCase();
        if(category==='גיבורי-על ודמויות') return 'מה שיופיע: דמות גיבור/דמות מרכזית עם מראה דרמטי ורקע קולנועי.';
        if(category==='פנטזיה ואפיות') return 'מה שיופיע: סצנה פנטסטית עם אלמנטים אפיים, עומק ואווירה עשירה.';
        if(category==='טבע ונופים') return 'מה שיופיע: נוף טבעי מודגש עם תאורה ואווירה קולנועית.';
        if(category==='עירוני ואדריכלות') return 'מה שיופיע: סביבה עירונית/אדריכלית מפורטת עם קומפוזיציה ברורה.';
        if(category==='מיתוג ושיווק') return 'מה שיופיע: ויזואל שיווקי/מיתוגי עם מיקוד במוצר או מסר.';
        if(p.includes('close-up')||p.includes('portrait')) return 'מה שיופיע: פורטרט ממוקד עם דגש על פנים/דמות.';
        if(p.includes('underwater')) return 'מה שיופיע: סצנה תת-ימית מפורטת עם צבעים ותנועה חזותית.';
        return 'מה שיופיע: סצנה יצירתית לפי הפרומפט עם דגש על סגנון ותאורה.';
      }

      const items=rows.map((r, i)=>{
        const category = (r[idx.category_he]||'כללי').trim();
        const prompt = (r[idx.prompt]||'').trim();
        const img=(r[idx.image_url]||'').trim();
        const type = ((r[idx.type]||'image').trim() || 'image').toLowerCase();
        const post=(r[idx.post_link]||'').trim();
        const fb=(r[idx.facebook_link]||'').trim();
        const out={
          id:'',
          img,
          prompt,
          post,
          fb,
          type,
          category,
          desc:(r[idx.description_he]||'').trim() || inferOutcome(prompt, category),
          outcome: inferOutcome(prompt, category),
          rowIndex:i
        };
        return {...out, sortScore:extractSortScore(out), promptLen:prompt.length};
      }).filter(x=>x.img && x.prompt).map(x=>({ ...x, id: makeId(x)})).filter(x=>!globalHiddenIds.has(x.id) && !localHiddenIds.has(x.id));

      function sortItems(arr){
        const cp=[...arr];
        if(filters.sort==='prompt_len_desc') cp.sort((a,b)=>b.promptLen-a.promptLen || b.sortScore-a.sortScore || a.rowIndex-b.rowIndex);
        else if(filters.sort==='prompt_len_asc') cp.sort((a,b)=>a.promptLen-b.promptLen || b.sortScore-a.sortScore || a.rowIndex-b.rowIndex);
        else if(filters.sort==='oldest') cp.sort((a,b)=>a.sortScore-b.sortScore || a.rowIndex-b.rowIndex);
        else cp.sort((a,b)=>b.sortScore-a.sortScore || b.rowIndex-a.rowIndex);
        return cp;
      }

      function computeFiltered(query=''){
        const q=query.trim().toLowerCase();
        let filtered=items;
        const allSelected = activeCategories.has('הכל');

        if(!allSelected) filtered=filtered.filter(x=>activeCategories.has(x.category));
        if(filters.favoritesOnly) filtered=filtered.filter(x=>favoriteIds.has(x.id));
        if(filters.type!=='all') filtered=filtered.filter(x=>(x.type||'image')===filters.type);
        if(filters.longOnly) filtered=filtered.filter(x=>(x.prompt||'').length>180);
        if(filters.fb==='with') filtered=filtered.filter(x=>!!x.fb);
        if(filters.fb==='without') filtered=filtered.filter(x=>!x.fb);

        if(q) filtered=filtered.filter(x => (`${x.prompt} ${x.type} ${x.post} ${x.fb} ${x.category} ${x.desc} ${x.outcome}`.toLowerCase().includes(q)));

        return sortItems(filtered);
      }

      function toggleCategory(cat){
        if(cat==='הכל'){ activeCategories = new Set(['הכל']); return; }
        if(activeCategories.has('הכל')) activeCategories.delete('הכל');
        if(activeCategories.has(cat)) activeCategories.delete(cat);
        else activeCategories.add(cat);
        if(activeCategories.size===0) activeCategories = new Set(['הכל']);
      }

      function saveFavorites(){
        localStorage.setItem(FAVORITES_KEY, JSON.stringify(Array.from(favoriteIds)));
      }

      function updateToolbarState(){
        favOnlyBtn.classList.toggle('active', filters.favoritesOnly);
        longPromptBtn.classList.toggle('active', filters.longOnly);
        batchModeBtn.classList.toggle('active', selectionMode);
      }

      function renderSummary(){
        const byCat={};
        for(const it of items){ byCat[it.category]=(byCat[it.category]||0)+1; }
        summary.innerHTML='';

        const total=document.createElement('span');
        total.className='chip'+(activeCategories.has('הכל')?' active':'');
        total.innerHTML=`<button type="button">הכל <b>(${items.length})</b></button>`;
        total.onclick=()=>{ toggleCategory('הכל'); render(search.value); };
        summary.appendChild(total);

        const favCount = items.filter(x=>favoriteIds.has(x.id)).length;
        const favChip=document.createElement('span');
        favChip.className='chip'+(filters.favoritesOnly?' active':'');
        favChip.innerHTML=`<button type="button">⭐ מועדפים <b>(${favCount})</b></button>`;
        favChip.onclick=()=>{ filters.favoritesOnly=!filters.favoritesOnly; render(search.value); };
        summary.appendChild(favChip);

        Object.entries(byCat).sort((a,b)=>b[1]-a[1]).forEach(([cat,n])=>{
          const el=document.createElement('span');
          el.className='chip'+(activeCategories.has(cat)?' active':'');
          el.innerHTML=`<button type="button">${escapeHtml(cat)} <b>(${n})</b></button>`;
          el.onclick=()=>{ toggleCategory(cat); render(search.value); };
          summary.appendChild(el);
        });
      }

      const detailOverlay = document.getElementById('detailOverlay');
      const detailContent = document.getElementById('detailContent');
      detailOverlay?.addEventListener('click', (e)=>{ if(e.target===detailOverlay) renderDetail(null); });

      function renderDetail(item){
        if(!item){
          selectedItem=null;
          detailOverlay.classList.remove('open');
          detailOverlay.setAttribute('aria-hidden','true');
          detailContent.innerHTML='';
          return;
        }
        selectedItem=item;
        detailOverlay.classList.add('open');
        detailOverlay.setAttribute('aria-hidden','false');
        detailContent.innerHTML = `
          <div class="detailTop">
            <div class="title">פרטים על התמונה שנבחרה</div>
            <button class="detailClose" id="detailCloseBtn">סגירה ✕</button>
          </div>
          <div class="detailGrid">
            <img src="${item.img}" alt="preview" />
            <div>
              <div class="meta"><span class="chip">סוג: ${escapeHtml(item.type||'image')}</span><span class="chip">קטגוריה: ${escapeHtml(item.category||'כללי')}</span></div>
              <div class="prompt" style="display:block;margin-top:8px">${escapeHtml(item.prompt||'—')}</div>
              <div class="desc"><b>תיאור קצר:</b> ${escapeHtml(item.desc||'—')}</div>
              <div class="desc"><b>מה יופיע בתמונה:</b> ${escapeHtml(item.outcome||'—')}</div>
              <div class="actions"><button class="btn ghost" id="dpCopyPrompt">העתקת פרומפט</button><button class="btn ghost" id="dpCopyImage">העתקת כתובת תמונה</button><a class="btn primary" href="${item.fb||item.post||item.img}" target="_blank">פתיחת כתובת פוסט</a></div>
            </div>
          </div>`;
        document.getElementById('dpCopyPrompt')?.addEventListener('click',()=>copyText(item.prompt,'פרומפט'));
        document.getElementById('dpCopyImage')?.addEventListener('click',()=>copyText(item.img,'כתובת תמונה'));
        document.getElementById('detailCloseBtn')?.addEventListener('click',()=>renderDetail(null));
      }

      function setViewMode(mode){
        viewMode=mode;
        document.body.classList.toggle('compact-view', mode==='compact');
        document.body.classList.toggle('gallery-view', mode==='gallery');
        expandedBtn.classList.toggle('active', mode==='expanded');
        compactBtn.classList.toggle('active', mode==='compact');
        galleryBtn.classList.toggle('active', mode==='gallery');
        if(mode!=='gallery') renderDetail(null);
      }

      function exportFilteredCsv(){
        const head=['id','category_he','type','prompt','description_he','image_url','post_link','facebook_link'];
        const lines=[head.join(',')];
        for(const x of filteredSnapshot){
          lines.push([
            x.id,x.category,x.type,x.prompt,x.desc,x.img,x.post,x.fb
          ].map(csvCell).join(','));
        }
        const blob=new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8;'});
        const a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download='graphics_filtered.csv';
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(()=>URL.revokeObjectURL(a.href),1000);
        showToast(`CSV יוצא (${filteredSnapshot.length} שורות)`);
      }

      function copySelected(){
        const selected=items.filter(x=>selectedIds.has(x.id));
        if(!selected.length){ showToast('לא נבחרו כרטיסים'); return; }
        const payload=selected.map((x,i)=>[
          `#${i+1}`,
          `פרומפט: ${x.prompt}`,
          `פוסט: ${x.fb||x.post||''}`,
          `תמונה: ${x.img}`
        ].join('\n')).join('\n\n');
        copyText(payload,`נבחרים (${selected.length})`);
      }

      function render(query=''){
        list.innerHTML='';
        const filtered=computeFiltered(query);
        filteredSnapshot=filtered;

        const selectedLabel = activeCategories.has('הכל') ? 'כל הקטגוריות' : Array.from(activeCategories).join(', ');
        count.textContent=`מציג ${filtered.length} מתוך ${items.length} · סינון: ${selectedLabel} · מועדפים: ${favoriteIds.size} · נבחרו: ${selectedIds.size}`;

        renderSummary();
        updateToolbarState();

        filtered.forEach(x=>{
          const isPromptOpen = expandedPrompts.has(x.id);
          const isFav = favoriteIds.has(x.id);
          const isSelected = selectedIds.has(x.id);
          const safeType=escapeHtml(x.type || 'image');
          const safeCat=escapeHtml(x.category || 'כללי');
          const safePrompt=escapeHtml(x.prompt || '—');
          const safeDesc=escapeHtml(x.desc || '—');
          const safeOutcome=escapeHtml(x.outcome || '—');

          const el=document.createElement('article');
          el.className='card';
          el.innerHTML=`
            <div class="visual">
              <img class="thumb" src="${x.img}" loading="lazy" alt="תמונה מתוך הקטלוג" />
              <button class="starBtn ${isFav?'active':''}" type="button" title="מועדפים">${isFav?'⭐':'☆'}</button>
              ${selectionMode?`<label class="selectPick"><input type="checkbox" ${isSelected?'checked':''} />בחר</label>`:''}
              <div class="badgeRow">
                <span class="badge">${safeType}</span>
                <span class="badge">${safeCat}</span>
              </div>
            </div>

            <div class="body">
              <div class="metaLinks">
                ${x.post ? `<a href="${x.post}" target="_blank">טלגרם</a>` : ''}
                ${x.fb ? `<a href="${x.fb}" target="_blank">פייסבוק</a>` : ''}
              </div>

              <div class="promptWrap">
                <div class="promptTop">
                  <span class="promptTitle">פרומפט (${x.promptLen})</span>
                  <button type="button" class="showPrompt">${isPromptOpen ? 'הסתר פרומפט' : 'הצג פרומפט'}</button>
                </div>
                <div class="prompt ${isPromptOpen ? 'open' : ''}">${safePrompt}</div>
              </div>

              <div class="desc"><b>תיאור קצר:</b> ${safeDesc}</div>
              <div class="desc"><b>מה יופיע בתמונה:</b> ${safeOutcome}</div>

              <div class="actions">
                <button class="btn ghost" data-copy-prompt>העתקת פרומפט</button>
                <button class="btn ghost" data-copy-image>העתקת כתובת תמונה</button>
                <a class="btn primary" href="${x.fb || x.post || x.img}" target="_blank">פתיחת כתובת פוסט</a>${isAdmin?`<button class="btn danger" data-hide-id="${x.id}">הסרה</button>`:""}
              </div>
            </div>`;

          el.querySelector('.starBtn').addEventListener('click',()=>{
            if(favoriteIds.has(x.id)) favoriteIds.delete(x.id); else favoriteIds.add(x.id);
            saveFavorites();
            render(search.value);
          });

          if(selectionMode){
            const cb=el.querySelector('.selectPick input');
            cb?.addEventListener('change',(e)=>{
              if(e.target.checked) selectedIds.add(x.id); else selectedIds.delete(x.id);
              count.textContent=`מציג ${filteredSnapshot.length} מתוך ${items.length} · סינון: ${selectedLabel} · מועדפים: ${favoriteIds.size} · נבחרו: ${selectedIds.size}`;
            });
          }

          el.querySelector('[data-copy-prompt]').addEventListener('click',()=>copyText(x.prompt,'פרומפט'));
          el.querySelector('[data-copy-image]').addEventListener('click',()=>copyText(x.img,'כתובת תמונה'));

          const promptBtn = el.querySelector('.showPrompt');
          const promptBlock = el.querySelector('.prompt');
          promptBtn.addEventListener('click', ()=>{
            const open = promptBlock.classList.toggle('open');
            if(open) expandedPrompts.add(x.id); else expandedPrompts.delete(x.id);
            promptBtn.textContent = open ? 'הסתר פרומפט' : 'הצג פרומפט';
          });

          el.querySelector('.thumb').addEventListener('click',()=>{
            if(viewMode==='gallery') return renderDetail(x);
            modalImg.src=x.img;
            modal.classList.add('open');
            modal.setAttribute('aria-hidden','false');
          });

          const hideBtn = el.querySelector('[data-hide-id]');
          if(hideBtn){
            hideBtn.addEventListener('click',()=>{
              localHiddenIds.add(x.id);
              localStorage.setItem(LOCAL_HIDDEN_KEY, JSON.stringify(Array.from(localHiddenIds)));
              showToast('הוסתר מקומית. לגלובלי: ייצא חסומים ושלח לי.');
              render(search.value);
            });
          }

          list.appendChild(el);
        });

        if(viewMode==='gallery' && selectedItem){
          const still=filtered.find(i=>i.id===selectedItem.id);
          if(!still) renderDetail(null);
        }

        if(!filtered.length){ list.innerHTML='<div class="sub">אין תוצאות לחיפוש</div>'; renderDetail(null); }
      }

      search.addEventListener('input',e=>render(e.target.value));
      expandedBtn.addEventListener('click', ()=>setViewMode('expanded'));
      compactBtn.addEventListener('click', ()=>setViewMode('compact'));
      galleryBtn.addEventListener('click', ()=>setViewMode('gallery'));

      favOnlyBtn.addEventListener('click',()=>{ filters.favoritesOnly=!filters.favoritesOnly; render(search.value); });
      typeFilter.addEventListener('change',()=>{ filters.type=typeFilter.value; render(search.value); });
      longPromptBtn.addEventListener('click',()=>{ filters.longOnly=!filters.longOnly; render(search.value); });
      fbFilter.addEventListener('change',()=>{ filters.fb=fbFilter.value; render(search.value); });
      sortSelect.addEventListener('change',()=>{ filters.sort=sortSelect.value; render(search.value); });

      batchModeBtn.addEventListener('click',()=>{ selectionMode=!selectionMode; if(!selectionMode) selectedIds.clear(); render(search.value); });
      copySelectedBtn.addEventListener('click',copySelected);
      clearSelectedBtn.addEventListener('click',()=>{ selectedIds.clear(); render(search.value); });
      exportCsvBtn.addEventListener('click',exportFilteredCsv);

      if(exportHiddenBtn){
        exportHiddenBtn.addEventListener('click',()=>{
          const payload=JSON.stringify({ids:Array.from(localHiddenIds)},null,2);
          copyText(payload,'removed_ids.json');
        });
      }

      (async ()=>{
        await loadGlobalHidden();
        setViewMode('gallery');
        render('');
      })();
    }).catch(()=>document.getElementById('list').textContent='שגיאה בטעינת הנתונים');
  </script>
</body>
</html>
