<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GraphicsSolutionTricks - Prompt Catalog</title>
  <style>
    :root{--bg:#f3f5fb;--card:#fff;--line:#e5e7eb;--text:#111827;--muted:#6b7280;--primary:#2563eb}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1160px;margin:0 auto;padding:16px}
    .topbar{position:sticky;top:0;z-index:20;background:#ffffffd9;backdrop-filter:blur(4px);border:1px solid var(--line);border-radius:14px;padding:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .btn{border:1px solid #d1d5db;background:#fff;border-radius:10px;padding:8px 12px;font-size:13px;cursor:pointer;text-decoration:none;color:#111;display:inline-flex;align-items:center;gap:6px}
    .btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
    .headline{font-size:22px;font-weight:700;margin:8px 0 0}
    .sub{font-size:13px;color:var(--muted);margin-top:2px}
    .searchRow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:12px 0}
    #search{width:min(560px,100%);border:1px solid #cfd4dc;border-radius:12px;padding:11px 12px;font-size:14px;background:#fff}
    #count{font-size:13px;color:var(--muted)}
    .summary{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 10px}
    .summary .chip{cursor:pointer}
    .summary .chip.active{background:#2563eb;color:#fff;border-color:#2563eb}
    .grid{display:grid;grid-template-columns:1fr;gap:12px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;display:grid;grid-template-columns:220px 1fr;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .thumb{width:100%;height:160px;object-fit:cover;border-radius:10px;background:#eceff4;cursor:zoom-in}
    .meta{font-size:13px;color:#374151;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .chip{display:inline-flex;align-items:center;border:1px solid #dbe1ea;background:#f8fafc;border-radius:999px;padding:4px 8px;font-size:12px;color:#334155}
    .prompt{margin-top:8px;line-height:1.5;font-size:14px;white-space:pre-wrap}
    .desc{margin-top:8px;font-size:13px;color:#374151;background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;padding:8px}
    .actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:8px 12px;border-radius:8px;font-size:13px;opacity:0;transition:.2s;z-index:10001}
    .toast.show{opacity:1}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.86);display:none;align-items:center;justify-content:center;padding:16px;z-index:10000}
    .modal.open{display:flex}
    .modal img{width:auto;height:auto;max-width:95vw;max-height:90vh;object-fit:contain;cursor:zoom-out}
    .modal .close{position:absolute;top:12px;left:12px;background:#fff;border:0;border-radius:999px;padding:8px 10px;cursor:pointer;font-weight:bold}
    @media (max-width:760px){
      .card{grid-template-columns:1fr}
      .thumb{height:190px}
      .headline{font-size:20px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="btn" href="./index.html">← כל הפרופילים</a>
      <a class="btn" href="./panha.html">לעמוד פרופיל שני</a>
      <a class="btn" href="./graphics.csv" target="_blank">CSV מקור</a>
      <span class="chip">v2 UI</span>
    </div>

    <div class="headline">GraphicsSolutionTricks</div>
    <div class="sub">קטלוג פרומפטים עם קטגוריה ותיאור בעברית</div>

    <div class="searchRow">
      <input id="search" type="text" placeholder="חיפוש בפרומפט / קטגוריה / סוג / קישורים" />
      <div id="count"></div>
    </div>
    <div id="summary" class="summary"></div>

    <div id="list" class="grid">טוען...</div>
  </div>

  <div id="toast" class="toast">הועתק</div>
  <div id="imgModal" class="modal" aria-hidden="true">
    <button class="close" id="closeModal">✕</button>
    <img id="modalImg" src="" alt="preview" />
  </div>

  <script>
    function parseCSV(text){
      const rows=[]; let i=0, cur='', row=[], q=false;
      while(i<text.length){
        const c=text[i];
        if(c==='"'){ if(q && text[i+1]==='"'){ cur+='"'; i++; } else q=!q; }
        else if(c===',' && !q){ row.push(cur); cur=''; }
        else if((c==='\n'||c==='\r') && !q){ if(c==='\r'&&text[i+1]==='\n') i++; row.push(cur); if(row.some(x=>x!=='')) rows.push(row); row=[]; cur=''; }
        else cur+=c;
        i++;
      }
      if(cur.length||row.length){ row.push(cur); rows.push(row); }
      return rows;
    }

    function showToast(msg){
      const t=document.getElementById('toast');
      t.textContent=msg; t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),1200);
    }

    async function copyText(text,label){
      try{ await navigator.clipboard.writeText(text||''); }
      catch{ const ta=document.createElement('textarea'); ta.value=text||''; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); }
      showToast(`הועתק: ${label}`);
    }

    const modal=document.getElementById('imgModal');
    const modalImg=document.getElementById('modalImg');
    const closeModal=()=>{ modal.classList.remove('open'); modal.setAttribute('aria-hidden','true'); modalImg.src=''; };
    document.getElementById('closeModal').addEventListener('click', closeModal);
    modal.addEventListener('click', (e)=>{ if(e.target===modal || e.target===modalImg) closeModal(); });
    document.addEventListener('keydown', (e)=>{ if(e.key==='Escape') closeModal(); });

    fetch('./graphics.csv').then(r=>r.text()).then(t=>{
      const rows=parseCSV(t); const head=rows.shift()||[];
      const idx=Object.fromEntries(head.map((h,i)=>[(h||'').trim(),i]));
      const list=document.getElementById('list');
      const count=document.getElementById('count');
      const search=document.getElementById('search');
      const summary=document.getElementById('summary');
      let activeCategory='הכל';

      function inferOutcome(prompt, category){
        const p=(prompt||'').toLowerCase();
        if(category==='גיבורי-על ודמויות') return 'מה שיופיע: דמות גיבור/דמות מרכזית עם מראה דרמטי ורקע קולנועי.';
        if(category==='פנטזיה ואפיות') return 'מה שיופיע: סצנה פנטסטית עם אלמנטים אפיים, עומק ואווירה עשירה.';
        if(category==='טבע ונופים') return 'מה שיופיע: נוף טבעי מודגש עם תאורה ואווירה קולנועית.';
        if(category==='עירוני ואדריכלות') return 'מה שיופיע: סביבה עירונית/אדריכלית מפורטת עם קומפוזיציה ברורה.';
        if(category==='מיתוג ושיווק') return 'מה שיופיע: ויזואל שיווקי/מיתוגי עם מיקוד במוצר או מסר.';
        if(p.includes('close-up')||p.includes('portrait')) return 'מה שיופיע: פורטרט ממוקד עם דגש על פנים/דמות.';
        if(p.includes('underwater')) return 'מה שיופיע: סצנה תת-ימית מפורטת עם צבעים ותנועה חזותית.';
        return 'מה שיופיע: סצנה יצירתית לפי הפרומפט עם דגש על סגנון ותאורה.';
      }

      const items=rows.map(r=>{
        const category = r[idx.category_he]||'כללי';
        const prompt = r[idx.prompt]||'';
        return {
          img:r[idx.image_url]||'',
          prompt,
          post:r[idx.post_link]||'',
          fb:r[idx.facebook_link]||'',
          type:r[idx.type]||'',
          category,
          desc:r[idx.description_he]||inferOutcome(prompt, category),
          outcome: inferOutcome(prompt, category)
        };
      }).filter(x=>x.img && x.prompt);

      function renderSummary(){
        const byCat={};
        for(const it of items){ byCat[it.category]=(byCat[it.category]||0)+1; }
        summary.innerHTML='';
        const totalChip=document.createElement('span');
        totalChip.className='chip'+(activeCategory==='הכל'?' active':'');
        totalChip.textContent=`הכל (${items.length})`;
        totalChip.onclick=()=>{activeCategory='הכל'; render(search.value);};
        summary.appendChild(totalChip);
        Object.entries(byCat).sort((a,b)=>b[1]-a[1]).forEach(([cat,n])=>{
          const el=document.createElement('span');
          el.className='chip'+(activeCategory===cat?' active':'');
          el.textContent=`${cat} (${n})`;
          el.onclick=()=>{activeCategory=cat; render(search.value);};
          summary.appendChild(el);
        });
      }

      function render(query=''){
        list.innerHTML='';
        const q=query.trim().toLowerCase();
        let filtered=items;
        if(activeCategory!=='הכל') filtered=filtered.filter(x=>x.category===activeCategory);
        if(q) filtered=filtered.filter(x => (
          `${x.prompt} ${x.type} ${x.post} ${x.fb} ${x.category} ${x.desc} ${x.outcome}`.toLowerCase().includes(q)
        ));

        count.textContent=`מציג ${filtered.length} מתוך ${items.length}`;
        renderSummary();

        filtered.forEach(x=>{
          const el=document.createElement('div'); el.className='card';
          el.innerHTML=`
            <div>
              <img class="thumb" src="${x.img}" loading="lazy" />
            </div>
            <div>
              <div class="meta">
                <span class="chip">סוג: ${x.type || 'image'}</span>
                <span class="chip">קטגוריה: ${x.category}</span>
                <a href="${x.post}" target="_blank">טלגרם</a>
                <span>·</span>
                <a href="${x.fb}" target="_blank">פייסבוק</a>
              </div>
              <div class="prompt">${x.prompt || '—'}</div>
              <div class="desc"><b>תיאור קצר:</b> ${x.desc}</div>
              <div class="desc"><b>מה יופיע בתמונה:</b> ${x.outcome}</div>
              <div class="actions">
                <button class="btn" data-copy-prompt>העתקת פרומפט</button>
                <button class="btn" data-copy-image>העתקת כתובת תמונה</button>
                <a class="btn primary" href="${x.fb || x.post}" target="_blank">פתיחת כתובת פוסט</a>
              </div>
            </div>`;

          el.querySelector('[data-copy-prompt]').addEventListener('click',()=>copyText(x.prompt,'פרומפט'));
          el.querySelector('[data-copy-image]').addEventListener('click',()=>copyText(x.img,'כתובת תמונה'));
          el.querySelector('.thumb').addEventListener('click',()=>{ modalImg.src=x.img; modal.classList.add('open'); modal.setAttribute('aria-hidden','false'); });
          list.appendChild(el);
        });

        if(!filtered.length){ list.innerHTML='<div class="sub">אין תוצאות לחיפוש</div>'; }
      }

      search.addEventListener('input',e=>render(e.target.value));
      render('');
    }).catch(()=>document.getElementById('list').textContent='שגיאה בטעינת הנתונים');
  </script>
</body>
</html>
